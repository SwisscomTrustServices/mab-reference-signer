qtsp:
  oidc:
    discovery-path: "${QTSP_DISCOVERY_PATH:https://example.invalid/.well-known/openid-configuration}"
  client:
    client-id: "${QTSP_CLIENT_ID:00000000-0000-0000-0000-000000000000}"
    client-secret: "${QTSP_CLIENT_SECRET:00000000-0000-0000-0000-000000000000}"
    redirect-uri: "${QTSP_REDIRECT_URI:https://example.invalid/callback}"
  mtls:
    base-url: "${QTSP_MTLS_BASE_URL:https://example.invalid}"
    client-cert: "${QTSP_MTLS_CLIENT_CERT:classpath:demo-client.pem}"
    client-key: "${QTSP_MTLS_CLIENT_KEY:classpath:demo-client.key}"

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.sts.demo.signer: INFO
    reactor.netty: WARN
    io.netty: WARN
    io.netty.handler.ssl.BouncyCastlePemReader: ERROR

spring:
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:dev}"