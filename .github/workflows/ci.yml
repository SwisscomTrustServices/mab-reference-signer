name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # If the executable bit isn't preserved in your repo, this avoids failures.
      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build (includes tests)
        run: ./gradlew build